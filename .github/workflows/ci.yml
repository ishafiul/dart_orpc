name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Resolve dependencies
        run: dart pub get

      - name: Analyze workspace
        run: dart run melos run analyze

      - name: Test workspace
        run: dart run melos test

      - name: Enforce generator coverage
        run: dart run melos run test:generator:coverage
