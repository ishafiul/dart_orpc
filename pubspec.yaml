name: dart_orpc_workspace
publish_to: none

environment:
  sdk: ^3.11.0

workspace:
  - packages/dart_orpc
  - packages/dart_orpc_annotations
  - packages/dart_orpc_cli
  - packages/dart_orpc_core
  - packages/dart_orpc_client
  - packages/dart_orpc_generator
  - packages/dart_orpc_http
  - packages/dart_orpc_luthor
  - packages/dart_orpc_openapi
  - apps/basic_app
  - apps/client_app

dev_dependencies:
  coverage: ^1.15.0
  melos: ^7.0.0

melos:
  packages:
    - packages/**
    - apps/**
  scripts:
    analyze:
      description: Analyze the whole workspace.
      run: dart analyze
    test:
      description: Run tests in workspace packages that define them.
      run: dart run melos exec --fail-fast --dir-exists=test -- dart test
    test:generator:coverage:
      description: Verify generator tests and enforce at least 90% line coverage.
      run: >-
        dart test packages/dart_orpc_generator --coverage=coverage/generator &&
        dart run coverage:format_coverage
        --packages=.dart_tool/package_config.json
        --report-on=packages/dart_orpc_generator/lib
        --in=coverage/generator
        --out=coverage/generator.lcov
        --lcov &&
        dart run tool/check_generator_coverage.dart coverage/generator.lcov 90
    format:
      description: Format the repository.
      run: dart format .
    serve:basic-app:
      description: Run the basic_app RPC server and keep it running.
      run: dart run dart_orpc_cli:dart_orpc serve --project apps/basic_app
    dev:basic-app:
      description: Watch the workspace, regenerate basic_app code, and restart the server.
      run: dart run dart_orpc_cli:dart_orpc watch --project apps/basic_app
    run:client-app:
      description: Run the example client against the basic_app server.
      run: dart run apps/client_app/bin/client.dart
